  - type: Features
    data:
      - name: AmeriCorps State and National
        description: >-
          Program engaging more than 75,000 Americans in intensive service through
          nonprofits, schools, public agencies, and community organizations addressing
          critical needs across all 50 states.
      - name: AmeriCorps VISTA
        description: >-
          Volunteers in Service to America (VISTA) program placing members with
          nonprofits and public agencies to build capacity and fight poverty.
      - name: AmeriCorps NCCC
        description: >-
          National Civilian Community Corps residential service program for young adults
          completing team-based service projects on environmental and disaster relief efforts.
      - name: AmeriCorps Seniors
        description: >-
          Programs engaging adults 55 and older in volunteer service through RSVP,
          Foster Grandparents, and Senior Companions programs.
      - name: Evidence Exchange Open Data
        description: >-
          Research and evaluation data portal (data.americorps.gov) providing SODA API
          access to program effectiveness studies, member outcome data, and ROI analyses.
      - name: Volunteer Generation Fund
        description: >-
          Grant program supporting organizations that recruit, manage, and support
          volunteers to meet critical community needs.
  - type: UseCases
    data:
      - name: Program Evaluation Research
        description: >-
          Accessing AmeriCorps program evaluation reports and impact data via the SODA
          API to conduct independent research on national service effectiveness.
      - name: Grant Management and Reporting
        description: >-
          Partners and grantees accessing program data and reporting resources to
          manage AmeriCorps grants and measure member outcomes.
      - name: Volunteer Engagement Analytics
        description: >-
          Analyzing volunteer engagement patterns, member satisfaction data, and
          civic participation trends using AmeriCorps open datasets.
      - name: Policy and Advocacy Research
        description: >-
          Accessing return-on-investment studies, evidence snapshots, and program
          outcome data to support policy development and advocacy for national service.
  - type: Integrations
    data:
      - name: Socrata Open Data API
        description: >-
          Standard Socrata SODA API integration enabling applications to query, filter,
          and aggregate AmeriCorps program data programmatically.
      - name: OData Endpoints
        description: >-
          OData V2 and V4 endpoints enabling connection to Microsoft Excel, Tableau,
          Power BI, and other business intelligence tools.
      - name: eGrants Grant Management System
        description: >-
          AmeriCorps eGrants system for grantee organizations to submit applications,
          manage awards, and report on AmeriCorps program activities.
