    name: AmeriCorps Open Data SODA API
    tags:
      - Open Data
      - Research
      - Evaluation
      - National Service
    humanURL: https://data.americorps.gov
    baseURL: https://data.americorps.gov/resource
    properties:
      - url: https://data.americorps.gov
        type: Documentation
      - url: https://data.americorps.gov/api/views
        type: DataAPI
    description: >-
      The AmeriCorps Open Data portal provides programmatic access to AmeriCorps research,
      evaluation, and program datasets via the Socrata Open Data API (SODA). The portal
      includes datasets on program outcomes, member experiences, return on investment
      studies, evidence snapshots for each AmeriCorps program, and evaluation reports.
      Data is available in JSON, CSV, XML, and RDF formats, with OData endpoints for
      connecting to tools like Excel and Tableau.
