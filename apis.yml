name: AmeriCorps
description: >-
  AmeriCorps is a federal agency that engages millions of Americans in service to their
  communities through programs including AmeriCorps State and National, AmeriCorps VISTA,
  AmeriCorps NCCC, AmeriCorps Seniors, and the Volunteer Generation Fund. Established in
  1993 under the Corporation for National and Community Service (CNCS), AmeriCorps addresses
  critical community needs in education, disaster response, environmental conservation,
  economic opportunity, and healthy futures. The agency operates the AmeriCorps Open Data
  portal (data.americorps.gov) providing programmatic access to research, evaluation, and
  program data via the Socrata Open Data API (SODA).
